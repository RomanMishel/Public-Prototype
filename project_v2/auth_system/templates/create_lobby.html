<html>
    <body>
        <h1>Create Lobby</h1>
        <p><a href="{% url 'lobby' %}">Back to lobby</a></p>
        <p><a href="{% url 'logout' %}">Logout</a></p>

        {% if error %}
        <p style="color: red;">{{ error }}</p>
        {% endif %}

        <form method="post" action="{% url 'create_lobby' %}">
            {% csrf_token %}
            <label for="game_type">Game:</label>
            <select name="game_type" id="game_type" required>
                <option value="chess" {% if selected_game == "chess" %}selected{% endif %}>Chess</option>
            </select>
            <br>
            <button type="submit">Create Lobby</button>
        </form>
    </body>
</html>
