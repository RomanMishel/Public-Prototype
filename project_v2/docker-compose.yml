# docker-compose.yml
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -r app/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-replace-me-db-password}@db:5432/${POSTGRES_DB:-appdb}
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-replace-me-db-password}
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
